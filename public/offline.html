<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#C8202C" />
  <title>离线 · Tandem 牛马搭子</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; }
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh;
      padding: max(env(safe-area-inset-top), 24px) 24px max(env(safe-area-inset-bottom), 24px);
      background: #0E0E0E;
      color: #f5f5f5;
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-align: center;
    }
    .wrap { max-width: 360px; }
    .badge {
      width: 64px; height: 64px; margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 18px;
      background: rgba(200, 32, 44, 0.14);
      color: #ff5a64;
    }
    h1 { font-size: 20px; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.01em; }
    p { font-size: 14px; line-height: 1.6; color: #b5b5b5; margin: 0 0 24px; }
    button {
      appearance: none; border: 0; cursor: pointer;
      touch-action: manipulation;
      background: #C8202C; color: #fff;
      font-size: 15px; font-weight: 600;
      padding: 12px 28px; border-radius: 12px;
      transition: transform .12s ease, background .12s ease;
    }
    button:active { transform: scale(0.97); background: #a81a24; }
    .hint { margin-top: 16px; font-size: 12px; color: #6f6f6f; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge" aria-hidden="true">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22" /><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" /><path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>
    <h1>暂时连不上网络</h1>
    <p>网络恢复后即可继续。已缓存的内容仍可使用，你也可以稍后再试。</p>
    <button type="button" onclick="location.reload()">重新加载</button>
    <div class="hint">Tandem · 牛马搭子</div>
  </div>
  <script>
    // 网络恢复自动重连
    window.addEventListener('online', function () { location.reload(); });
  </script>
</body>
</html>
